<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Dify 工作流极简客户端</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; color: #333; }
        .config-box, .input-box { background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007BFF; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin-top: 15px; }
        button:hover { background: #0056b3; }
        
        /* 节点状态样式 */
        #node-status-area { margin-top: 20px; padding: 10px; background: #fafafa; border: 1px solid #ddd; border-radius: 4px; }
        .node-track { margin: 5px 0; padding: 8px; border-left: 4px solid #ccc; background: #fff; }
        .node-track.running { border-left-color: #ffc107; background: #fffbeb; }
        .node-track.succeeded { border-left-color: #28a745; background: #f4fbf5; }
        .node-track.failed { border-left-color: #dc3545; background: #fdf3f4; }
        
        /* 输出区域样式 */
        #output-area { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 4px; min-height: 50px; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

    <h2>Dify Workflow 极简测试面板</h2>

    <div class="config-box">
        <label>Dify API Key (请妥善保管):</label>
        <input type="text" id="apiKey" value="app-xxxxxxxxxxxxxxxxxxxx" placeholder="输入你的 Dify Workflow API 密钥">
    </div>

    <div class="input-box">
        <label>工作流输入变量名 (根据你Dify开始节点的变量名修改):</label>
        <input type="text" id="variableKey" value="text" placeholder="例如: text 或 query">
        
        <label>输入内容:</label>
        <textarea id="inputValue" rows="4" placeholder="请输入你要发给工作流的内容..."></textarea>
        
        <button id="runBtn" onclick="startWorkflow()">运行工作流</button>
    </div>

    <h3>1. 节点执行状态</h3>
    <div id="node-status-area">等待运行...</div>

    <h3>2. 最终输出 (或文本流)</h3>
    <div id="output-area">暂无输出</div>

    <script>
        async function startWorkflow() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const varKey = document.getElementById('variableKey').value.trim();
            const varValue = document.getElementById('inputValue').value;
            
            const nodeStatusArea = document.getElementById('node-status-area');
            const outputArea = document.getElementById('output-area');
            const runBtn = document.getElementById('runBtn');

            if (!apiKey) { alert('请输入 API Key'); return; }
            if (!varKey) { alert('请输入变量名'); return; }

            // 初始化界面
            nodeStatusArea.innerHTML = '正在初始化连接...';
            outputArea.innerText = '';
            runBtn.disabled = true;

            // 构造请求体
            const requestBody = {
                inputs: { [varKey]: varValue },
                response_mode: "streaming",
                user: "test-user-" + Math.random().toString(36).substr(2, 5)
            };

            try {
                // 使用 fetch 发起流式请求
                const response = await fetch('https://api.dify.ai/v1/workflows/run', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`HTTP 错误 ${response.status}: ${errText}`);
                }

                // 读取 SSE 流
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';

                // 用一个 Map 来管理和更新界面的各个节点 HTML 元素
                const nodeElements = new Map();
                nodeStatusArea.innerHTML = '<h4>正在执行工作流节点...</h4>';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    // 将新读取的块加入缓冲区并按行切分
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    
                    // 最后一行如果不完整则留到下次处理
                    buffer = lines.pop(); 

                    for (const line of lines) {
                        if (!line.trim() || !line.startsWith('data:')) continue;
                        
                        try {
                            // 解析 json 数据
                            const jsonStr = line.replace(/^data:\s*/, '');
                            const eventData = JSON.parse(jsonStr);
                            const event = eventData.event;
                            const data = eventData.data;

                            // 1. 处理节点开始事件
                            if (event === 'node_started') {
                                const nodeId = data.node_id;
                                const nodeDiv = document.createElement('div');
                                nodeDiv.className = 'node-track running';
                                nodeDiv.innerHTML = `⏳ <b>${data.title}</b> (${data.node_type}) - 运行中...`;
                                nodeStatusArea.appendChild(nodeDiv);
                                nodeElements.set(nodeId, nodeDiv); // 保存引用以便后续修改状态
                            }

                            // 2. 处理文本片段事件（打字机效果输出）
                            if (event === 'text_chunk' && data && data.text) {
                                outputArea.innerText += data.text;
                            }

                            // 3. 处理节点完成事件
                            if (event === 'node_finished') {
                                const nodeId = data.node_id;
                                const nodeDiv = nodeElements.get(nodeId);
                                if (nodeDiv) {
                                    nodeDiv.className = `node-track ${data.status}`;
                                    const timeCost = data.elapsed_time ? `${data.elapsed_time.toFixed(2)}s` : '-';
                                    if (data.status === 'succeeded') {
                                        nodeDiv.innerHTML = `✅ <b>${data.title}</b> - 执行成功 (耗时: ${timeCost})`;
                                    } else {
                                        nodeDiv.innerHTML = `❌ <b>${data.title}</b> - 执行失败! 原因: ${data.error || '未知'}`;
                                    }
                                }
                            }

                            // 4. 处理整个工作流结束
                            if (event === 'workflow_finished') {
                                const finalStatus = data.status === 'succeeded' ? '🏁 工作流执行全部完成！' : '⚠️ 工作流中断或失败。';
                                const tip = document.createElement('div');
                                tip.style.marginTop = '10px';
                                tip.style.fontWeight = 'bold';
                                tip.innerText = `${finalStatus} 总耗时: ${data.elapsed_time.toFixed(2)}s`;
                                nodeStatusArea.appendChild(tip);

                                // 如果工作流配置了最终 outputs 且未在文本流中完整显示，将其打印到输出区
                                if (data.outputs && Object.keys(data.outputs).length > 0 && outputArea.innerText === '') {
                                    outputArea.innerText = JSON.stringify(data.outputs, null, 2);
                                }
                            }

                        } catch (e) {
                            console.error("解析单行流数据出错:", e);
                        }
                    }
                }

            } catch (error) {
                nodeStatusArea.innerHTML = `<span style="color:red">🔴 发生错误: ${error.message}</span>`;
                console.error(error);
            } finally {
                runBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
