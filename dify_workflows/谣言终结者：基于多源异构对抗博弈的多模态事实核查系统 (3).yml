    - data:
        code: "import re\nimport requests\n\ndef main(text: str) -> dict:\n    user_text\
          \ = text if text else \"\"\n    \n    if not user_text:\n        return\
          \ {\n            \"is_valid\": True, \n            \"status_code\": 200,\
          \ \n            \"reason\": \"Empty input\",\n            \"clean_text\"\
          : \"\"  # 即使为空也返回相同字段\n        }\n\n    # 匹配文本中所有 URL\n    url_pattern =\
          \ r'https?://[^\\s\\u4e00-\\u9fa5]+'\n    urls = re.findall(url_pattern,\
          \ user_text)\n\n    # 情况 1：一个 URL 都没有，文本本来就是干净的\n    if not urls:\n    \
          \    return {\n            \"is_valid\": True, \n            \"status_code\"\
          : 200, \n            \"reason\": \"No URL found\",\n            \"clean_text\"\
          : user_text\n        }\n\n    clean_text = user_text\n    has_bad_url =\
          \ False\n\n    # 情况 2：有 URL，逐个校验\n    for url in urls:\n        clean_url\
          \ = url.rstrip('.,;)）]｝〉〉\"\\'')\n        \n        try:\n            response\
          \ = requests.head(clean_url, timeout=5, allow_redirects=True)\n        \
          \    if response.status_code == 405:\n                response = requests.get(clean_url,\
          \ timeout=5, allow_redirects=True)\n            \n            # 如果链接失效 (404等)\n\
          \            if not (200 <= response.status_code < 400):\n             \
          \   has_bad_url = True\n                # 【核心修改】：直接把文本里的这个错误 URL 替换为空（抠掉它）\n\
          \                clean_text = clean_text.replace(url, \"[已过滤失效链接]\")\n \
          \               \n        except requests.exceptions.RequestException:\n\
          \            has_bad_url = True\n            # 网络无法连通的链接也抠掉\n          \
          \  clean_text = clean_text.replace(url, \"[已过滤失效链接]\")\n\n    # 最终逻辑：只要包含了任意一个坏链，is_valid\
          \ 就是 False\n    return {\n        \"is_valid\": not has_bad_url,\n     \
          \   \"status_code\": 200,\n        \"reason\": \"Contains bad URLs\" if\
          \ has_bad_url else \"All URLs valid\",\n        \"clean_text\": clean_text\
          \  # 输出清洗后的干净文本\n    }"
