app:
  description: '针对互联网网络谣言、AI 深度伪造新闻（Deepfake）泛滥，导致老年人及青少年群体极易上当受骗的社会痛点，本项目开发了一套具备高度社会公益价值的事实核查闭环工作流。


    项目旨在解决实际问题，弘扬科学精神。系统赋予 AI “多维感知能力”与“闭环控制权”，通过语音转文字（STT）和视觉大模型，无缝接收长辈在微信群等社交媒体上遭遇的模糊截图或语音求助。系统内部通过“权威白名单取证”与“文本逻辑挑刺”两个多智能体在暗中对抗博弈，确保辟谣证据链铁证如山。项目最大的亮点在于打通了适老化的“最后一公里”——利用大模型将晦涩的科学原理和严肃报告进行“极端文本降维”，一键分发为“结论前置、大字报排版、亲切接地气”的一页纸科普海报，方便子女快速转发至家庭微信群，让前沿大模型技术真正转化为守护千家万户清朗网络空间的人文力量。'
  icon: 🤖
  icon_background: '#FFEAD5'
  icon_type: emoji
  mode: workflow
  name: 谣言终结者：基于多源异构对抗博弈的多模态事实核查系统
  use_icon_as_answer_icon: false
